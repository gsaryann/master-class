name: Laravel CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - develop
      - uat
      - main

jobs:
  tests:
    name: Tests with coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: pcov
          extensions: mbstring, pdo_sqlite, sqlite3

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.ci .env
          php artisan key:generate --force

      - name: Run tests
        run: php artisan test --coverage --min=50

  phpstan:
    name: PHPStan / Larastan
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  lint:
    name: Laravel Pint
    runs-on: ubuntu-latest
    needs: phpstan

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        if: github.ref_name == 'develop' || github.ref_name == 'uat' || github.ref_name == 'main' || github.event_name == 'pull_request'
        run: vendor/bin/pint --test

      - name: Format code on other branches
        if: github.event_name == 'push' && github.ref_name != 'develop' && github.ref_name != 'uat' && github.ref_name != 'main'
        run: vendor/bin/pint

  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref_name == 'develop'

    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: |
          cp .env.dev .env
          echo "Deploying to DEV with .env.dev"

  deploy-uat:
    name: Deploy UAT
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref_name == 'uat'

    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: |
          cp .env.uat .env
          echo "Deploying to UAT with .env.uat"

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref_name == 'main'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: |
          cp .env.prod .env
          echo "Deploying to PROD with .env.prod"
  notify:
    name: Notify maintainers
    runs-on: ubuntu-latest
    needs: [tests, phpstan, lint, deploy-dev, deploy-uat, deploy-prod]
    if: always()

    steps:
      - name: Show pipeline result
        run: |
          echo "Maintainers notification"
          echo "Tests: ${{ needs.tests.result }}"
          echo "PHPStan: ${{ needs.phpstan.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Deploy DEV: ${{ needs.deploy-dev.result }}"
          echo "Deploy UAT: ${{ needs.deploy-uat.result }}"
          echo "Deploy PROD: ${{ needs.deploy-prod.result }}"
